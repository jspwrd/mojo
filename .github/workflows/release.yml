name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset_os: linux
            asset_arch: x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset_os: linux
            asset_arch: aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            asset_os: macos
            asset_arch: x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset_os: macos
            asset_arch: aarch64
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux native)
        if: matrix.asset_os == 'linux' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET_NAME="mojo-${TAG}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/mojo staging/
          tar -czf "${ASSET_NAME}" -C staging mojo
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mojo-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: ${{ env.ASSET_NAME }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
